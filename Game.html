<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Boxfish</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#001d3d;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}

#score{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:42px;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
    user-select:none;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    text-shadow:2px 2px 8px black;
    user-select:none;
}

#message h1{
    font-size:56px;
    margin-bottom:10px;
}

#message p{
    font-size:24px;
}
</style>

</head>
<body>

<div id="score">0</div>

<div id="message">
    <h1>🐠 Flappy Boxfish</h1>
    <p>Click, Tap, or Press Space</p>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const scoreDisplay = document.getElementById("score");
const message = document.getElementById("message");

let frame = 0;
let score = 0;
let gameStarted = false;
let gameOver = false;

let highScore =
localStorage.getItem("boxfishHighScore") || 0;

const fish = {
    x:150,
    y:300,
    radius:22,
    velocity:0,
    gravity:0.5,
    flap:-9
};

const corals = [];
const bubbles = [];

const coralWidth = 90;
const coralGap = 220;

function resetGame(){

    fish.y = canvas.height/2;
    fish.velocity = 0;

    score = 0;
    frame = 0;

    corals.length = 0;
    bubbles.length = 0;

    gameStarted = false;
    gameOver = false;

    scoreDisplay.textContent = "0";

    message.innerHTML =
    `
    <h1>🐠 Flappy Boxfish</h1>
    <p>Click, Tap, or Press Space</p>
    <br>
    <p>High Score: ${highScore}</p>
    `;

    message.style.display = "block";
}

function flap(){

    if(gameOver){
        resetGame();
        return;
    }

    if(!gameStarted){
        gameStarted = true;
        message.style.display = "none";
    }

    fish.velocity = fish.flap;
}

window.addEventListener("keydown", e=>{
    if(e.code === "Space"){
        flap();
    }
});

window.addEventListener("mousedown", flap);
window.addEventListener("touchstart", flap);

function createBubble(){

    bubbles.push({
        x:Math.random()*canvas.width,
        y:canvas.height+10,
        size:Math.random()*6+2,
        speed:Math.random()*2+1
    });
}

function drawOcean(){

    const g = ctx.createLinearGradient(
        0,0,0,canvas.height
    );

    g.addColorStop(0,"#19b6ff");
    g.addColorStop(1,"#001d3d");

    ctx.fillStyle = g;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

function drawBubble(b){

    ctx.beginPath();
    ctx.arc(
        b.x,
        b.y,
        b.size,
        0,
        Math.PI*2
    );

    ctx.strokeStyle =
    "rgba(255,255,255,0.7)";

    ctx.lineWidth = 2;
    ctx.stroke();
}

function drawBoxfish(){

    ctx.save();

    ctx.translate(fish.x, fish.y);

    ctx.rotate(
        Math.max(
            -0.4,
            Math.min(
                0.5,
                fish.velocity * 0.04
            )
        )
    );

    // body
    ctx.fillStyle = "#ffd93d";

    ctx.beginPath();

    ctx.roundRect(
        -22,
        -22,
        44,
        44,
        10
    );

    ctx.fill();

    // spots
    ctx.fillStyle = "#111";

    const spots = [
        [-10,-10],[0,-12],[10,-8],
        [-12,3],[3,0],[14,8],
        [-8,12],[6,14]
    ];

    spots.forEach(s=>{
        ctx.beginPath();
        ctx.arc(
            s[0],
            s[1],
            3,
            0,
            Math.PI*2
        );
        ctx.fill();
    });

    // eye
    ctx.fillStyle = "white";

    ctx.beginPath();
    ctx.arc(12,-5,5,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "black";

    ctx.beginPath();
    ctx.arc(13,-5,2,0,Math.PI*2);
    ctx.fill();

    // tail
    const wag =
    Math.sin(frame*0.4)*5;

    ctx.fillStyle = "#ffe66d";

    ctx.beginPath();
    ctx.moveTo(-22,0);
    ctx.lineTo(-38,-12+wag);
    ctx.lineTo(-38,12-wag);
    ctx.closePath();
    ctx.fill();

    // top fin
    ctx.beginPath();
    ctx.moveTo(0,-22);
    ctx.lineTo(8,-34);
    ctx.lineTo(16,-22);
    ctx.closePath();
    ctx.fill();

    // bottom fin
    ctx.beginPath();
    ctx.moveTo(0,22);
    ctx.lineTo(8,34);
    ctx.lineTo(16,22);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function spawnCoral(){

    const min = 120;

    const max =
    canvas.height -
    coralGap -
    120;

    const topHeight =
    Math.random()*(max-min)+min;

    corals.push({
        x:canvas.width,
        top:topHeight,
        passed:false
    });
}

function drawCoral(x,y,h){

    ctx.strokeStyle = "#ff6b81";
    ctx.lineWidth = 12;

    ctx.beginPath();
    ctx.moveTo(x+45,y);
    ctx.lineTo(x+45,y+h);
    ctx.stroke();

    for(let i=0;i<7;i++){

        let by =
        y+(h/7)*i;

        ctx.beginPath();

        ctx.moveTo(x+45,by);

        let dir =
        i%2===0 ? -1 : 1;

        ctx.lineTo(
            x+45+(dir*35),
            by-20
        );

        ctx.stroke();
    }
}

function endGame(){

    gameOver = true;

    if(score > highScore){

        highScore = score;

        localStorage.setItem(
            "boxfishHighScore",
            highScore
        );
    }

    message.innerHTML =
    `
    <h1>Game Over</h1>
    <p>Score: ${score}</p>
    <p>High Score: ${highScore}</p>
    <br>
    <p>Tap or Press Space</p>
    `;

    message.style.display = "block";
}

function update(){

    requestAnimationFrame(update);

    frame++;

    drawOcean();

    if(frame % 12 === 0){
        createBubble();
    }

    for(let i=bubbles.length-1;i>=0;i--){

        let b = bubbles[i];

        b.y -= b.speed;

        drawBubble(b);

        if(b.y < -20){
            bubbles.splice(i,1);
        }
    }

    if(gameStarted && !gameOver){

        fish.velocity += fish.gravity;
        fish.y += fish.velocity;

        if(frame % 110 === 0){
            spawnCoral();
        }

        for(let i=corals.length-1;i>=0;i--){

            const c = corals[i];

            c.x -= 4;

            drawCoral(
                c.x,
                0,
                c.top
            );

            drawCoral(
                c.x,
                c.top + coralGap,
                canvas.height -
                (c.top + coralGap)
            );

            if(
                fish.x + fish.radius > c.x &&
                fish.x - fish.radius < c.x + coralWidth
            ){

                if(
                    fish.y - fish.radius < c.top ||
                    fish.y + fish.radius >
                    c.top + coralGap
                ){
                    endGame();
                }
            }

            if(
                !c.passed &&
                c.x + coralWidth < fish.x
            ){
                c.passed = true;
                score++;
                scoreDisplay.textContent = score;
            }

            if(c.x < -coralWidth){
                corals.splice(i,1);
            }
        }

        if(
            fish.y < 0 ||
            fish.y > canvas.height
        ){
            endGame();
        }
    }

    drawBoxfish();
}

resetGame();
update();

</script>

</body>
</html>
